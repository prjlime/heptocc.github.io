<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heptocc</title>
    <!-- Imports Bebas Neue and Montserrat from Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #AC9D8E; /* Set your requested background color here */
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif; 
            font-style: italic; 
            font-size: 5.5rem; 
            margin-bottom: 0px;
            letter-spacing: 2px;
            /* Creates the gradient from #ADEBB3 to #CCCCFF */
            background: linear-gradient(45deg, #ADEBB3, #CCCCFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.1rem;
            color: #E7D27C; /* Set your requested body text color here */
            margin-top: 5px;
            letter-spacing: 1px;
            font-weight: bold; /* Added weight to make the gold text easier to read on this background */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>heptocc</h1>
        <p>the gates to heptocc are awaiting construction</p>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heptocc</title>
    <!-- Imports Bebas Neue and Montserrat from Google Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #2a2b40);
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif; 
            font-style: italic; /* This forces Bebas Neue into an italic slant */
            font-size: 5.5rem; /* Bebas Neue is naturally tall, so we can make it huge */
            margin-bottom: 0px;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff7b00, #ffae00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.1rem;
            color: #a0a0b8;
            margin-top: 5px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>heptocc</h1>
        <p>the gates to heptocc are awaiting construction</p>
    </div>
</body>
</html>
